name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: yap
          POSTGRES_PASSWORD: yap
          POSTGRES_DB: yap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yap -d yap_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://yap:yap@localhost:5432/yap_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm --filter @yap/api test

databases:
  - name: yap-postgres
    databaseName: yap
    user: yap
    plan: basic-256mb

services:
  - type: web
    name: yap-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yap-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: EMAIL_TRANSPORT
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: STORAGE_DRIVER
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: yap-web
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false --filter "@yap/web..." && pnpm --filter @yap/contracts build && pnpm --filter @yap/web build
    startCommand: node apps/web/.output/server/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: NUXT_PUBLIC_API_BASE
        sync: false

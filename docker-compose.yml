services:
  postgres:
    image: postgres:17-alpine
    container_name: yap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yap
      POSTGRES_PASSWORD: yap
      POSTGRES_DB: yap
    ports:
      - "5432:5432"
    volumes:
      - yap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yap -d yap"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  yap-postgres-data:
